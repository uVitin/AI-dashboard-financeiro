<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FinanceDashboard_AI - Login</title>
        <link rel="stylesheet" href="css/reset.css">
        <link rel="stylesheet" href="css/auth.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    </head>
    <body class="auth-page">
        
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">💰</div>
                <span class="auth-logo-text">FinanceDashboard_AI</span>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Entrar</button>
                <button class="auth-tab" onclick="switchTab('register')">Cadastrar</button>
            </div>
    
            <div id="error-msg" class="auth-error"></div>
    
            <!-- Login -->
            <div id="form-login">
                <h1 class="auth-title">Bem-vindo de volta!</h1>
                <p class="auth-subtitle">Entre com sua conta para continuar</p>
    
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="login-email" class="form-input" placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Senha</label>
                    <input type="password" id="login-password" class="form-input" placeholder="**********">
                </div>
                <button class="btn btn-primary" onclick="handleLogin()">Entrar</button>
            </div>
    
            <!-- Cadastro -->
            <div id="form-register" style="display: none;">
                <h1 class="auth-title">Criar conta</h1>
                <p class="auth-subtitle">Comece a controlar suas finanças hoje!</p>
    
                <div class="form-group">
                    <label class="form-label">Nome</label>
                    <input type="text" id="register-name" class="form-input" placeholder="Seu nome">
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="register-email" class="form-input" placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Senha</label>
                    <input type="password" id="register-password" class="form-input" placeholder="**********">
                </div>
                <button class="btn btn-primary" onclick="handleRegister()">Criar conta</button>
            </div>
        </div>

        <script src="js/config.js"></script>
        <script src="js/auth.js"></script>
    </body>
</html>
